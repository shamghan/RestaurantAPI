name: restaurant-api
on:
  push:
    branches: [ main ]

  pull_request:
    branches:
    - main
  workflow_dispatch:
    
  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          # Optional SDK version(s) to use. If not provided, will install global.json version when available. Examples: 2.2.104, 3.1, 3.1.x, 3.x, 6.0.2xx, latest
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test
